services:
  backend:
    build:
      context: ../primus-backend
      target: backend
    #    ports:
    #      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/ssl/certs/rootCA.pem
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - SECRET_KEY=${SECRET_KEY}
      - REPORT_DIR=${REPORT_DIR:-/data/reports}
      - MEDIA_ROOT=${MEDIA_ROOT:-/data/media}
      - CELERY_BROKER_URL=rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/ssl/certs/rootCA.pem
      - CELERY_RESULT_BACKEND=rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/ssl/certs/rootCA.pem

      - VOICE_LLM_PROVIDER=${VOICE_LLM_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434/api/generate}
      - VOICE_LLM_MODEL=${VOICE_LLM_MODEL:-qwen3:4b}
      - VOICE_LLM_API_KEY=${VOICE_LLM_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
      worker:
        condition: service_started
      minio:
        condition: service_started
      init-certs:
        condition: service_completed_successfully
    restart: always
    volumes:
      - ../primus-backend/alembic:/app/alembic
      - backend_data:/data
      - ./nginx/certs:/etc/ssl/certs:ro

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      init-certs:
        condition: service_completed_successfully
    restart: always

  worker:
    build:
      context: ../primus-backend
      target: worker

    environment:
      # Required for YOLO 
      - YOLO_CONFIG_DIR=/tmp/Ultralytics
      - MPLCONFIGDIR=/tmp/matplotlib
      - OMP_NUM_THREADS=1

      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/ssl/certs/rootCA.pem
      - CELERY_BROKER_URL=rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/ssl/certs/rootCA.pem
      - CELERY_RESULT_BACKEND=rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/ssl/certs/rootCA.pem

      # Scheduler Config (moved from celery-beat)
      - REPORTS_SCHEDULE_HOUR=${REPORTS_SCHEDULE_HOUR}
      - REPORTS_SCHEDULE_MINUTE=${REPORTS_SCHEDULE_MINUTE}
      - BACKUP_SCHEDULE_HOUR=${BACKUP_SCHEDULE_HOUR}
      - BACKUP_SCHEDULE_MINUTE=${BACKUP_SCHEDULE_MINUTE}

      - PYTHONPATH=/app

    # Combined worker and beat command
    command: python -m celery -A app.core.celery_worker.celery_app worker -l info -c 4 --beat -s /tmp/celerybeat-schedule

    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      init-certs:
        condition: service_completed_successfully
    restart: always
    volumes:
      - backend_data:/data
      - ./nginx/certs:/etc/ssl/certs:ro

    # Enable GPU Support (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  frontend:
    build:
      context: ../primus-web-frontend
    #    ports:
    #      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend
    restart: always

  mock-sensor:
    build:
      context: ../primus-mock-sensor
    ports:
      - "8501:8501"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - BACKEND_URL=https://nginx/api/v1
      - MQTT_TLS_CA=/etc/ssl/certs/rootCA.pem
      - ADMIN_LOGIN=${ADMIN_LOGIN:-SUPER_ADMIN}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Asdf#1234}
    volumes:
      - ./nginx/certs:/etc/ssl/certs:ro
    depends_on:
      mosquitto:
        condition: service_started
      backend:
        condition: service_started
      nginx:
        condition: service_started
      init-certs:
        condition: service_completed_successfully
    restart: always

  mqtt-listener:
    build:
      context: ../primus-mqtt-listener
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - REDIS_URL=rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/ssl/certs/rootCA.pem
      - BACKEND_URL=https://nginx/api/v1
      - MQTT_TLS_CA=/etc/ssl/certs/rootCA.pem
      - ADMIN_LOGIN=${ADMIN_LOGIN:-SUPER_ADMIN}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Asdf#1234}
    volumes:
      - ./nginx/certs:/etc/ssl/certs:ro
    depends_on:
      mosquitto:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_started
      nginx:
        condition: service_started
      init-certs:
        condition: service_completed_successfully
    restart: always

  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    command: redis-server --tls-port 6379 --port 0 --tls-cert-file /certs/service.crt --tls-key-file /certs/service.key --tls-ca-cert-file /certs/rootCA.pem --tls-auth-clients no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./nginx/certs:/certs:ro
    restart: always

  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "8883:8883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./configs/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./nginx/certs:/mosquitto/config/certs
    restart: always

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9002:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " until /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...'
        sleep 1
      done; /usr/bin/mc mb -p myminio/product-images; /usr/bin/mc mb -p myminio/reports; /usr/bin/mc mb -p myminio/datasets; /usr/bin/mc mb -p myminio/models; /usr/bin/mc mb -p myminio/backups; /usr/bin/mc anonymous set public myminio/product-images; exit 0; "

  init-certs:
    image: alpine:latest
    user: root
    command: >
      sh -c "apk add --no-cache openssl bash && if [ ! -f /certs/rootCA.pem ]; then
        echo 'Generating SSL Certificates...';
        bash /scripts/generate_certs.sh;
        chmod 644 /certs/*;
      else
        echo 'SSL Certificates already exist.';
      fi && mkdir -p /app/backups && chmod 777 /app/backups"
    volumes:
      - ./backups:/app/backups
      - ./nginx/certs:/certs
      - ./scripts:/scripts

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts:/scripts
    entrypoint: /scripts/ollama-entrypoint.sh
    restart: always
    environment:
      - OLLAMA_VULKAN=1
    # Enable GPU Support (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  backend_data:
  minio_data:
  ollama_data:
